<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VimenStock - Historial</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
<header>
  <div class="left">
    <img src="https://victormenjon.es/favicon.ico" class="icon">
    <span>VimenStock</span>
  </div>
  <div class="center">
    <a href="index.html">Productos</a>
    <a href="historial.html">Historial</a>
    <a href="finanzas.html">Finanzas</a>
  </div>
  <div class="right">
    <!-- BOTÓN TOGGLE -->
    <button id="toggle-dark" class="toggle-btn">
      <span class="icon icon-sun"></span>
      <span class="icon icon-moon"></span>
    </button>
  </div>
</header>

<div class="container-hist">
  <button id="btn-toggle-filtros" type="button">▼ FILTROS ▼</button>

  <div id="bloque-filtros" class="collapsible-form">
    <label>Filtrar por tipo:
      <select id="filtro-tipo">
        <option value="todos">Todos</option>
        <option value="Añadido">Añadido</option>
        <option value="Comprado">Comprado</option>
        <option value="Vendido">Vendido</option>
        <option value="Editado">Editado</option>
      </select>
    </label>

    <label>Fecha exacta:
      <input type="text" id="filtro-fecha" placeholder="dd/mm/yyyy">
    </label>

    <div class="rango-fechas">
      <label>Desde
        <input type="text" id="filtro-fecha-desde" placeholder="dd/mm/yyyy">
      </label>
      <label>Hasta
        <input type="text" id="filtro-fecha-hasta" placeholder="dd/mm/yyyy">
      </label>
    </div>

    <label>Filtrar por ID de producto:
      <input type="input" id="filtro-id" placeholder="ID">
    </label>

    <button id="reset-filtros" type="button">Reiniciar filtros</button>
  </div>

  <table id="tabla-historial">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Producto (ID / Nombre)</th>
        <th>Acción</th>
        <th>Cantidad</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="historial.js"></script>
<script src="lightdark.js"></script>
<script>
  document.querySelectorAll('button[id^="btn-toggle-"]').forEach(btn => {
  btn.addEventListener('click', () => {
    const form = btn.nextElementSibling;
    form.classList.toggle('show');
    const icon = btn.querySelector('svg');
    if(icon) icon.classList.toggle('rotated');
  });
});
</script>
</body>
</html>
